<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>와 이거 개꿀잼이다!</title>
</head>
<body>

<form>
    <!-- form은 배송박스같은 느낌, 없으면 데이터를 최종적으로 포장을 못한다 -->
    <input type="text" name = "search">
    <!-- name의 역할은 사용자가 어떤 값을 타이핑하면 그 값들을 search값으로 포장(이름표인 것, search=블라블라 이런 식)해서 서버에 보내는 것 -->
    <input type="submit">
</form>
<form action="#" method="get"></form>
<input type="text", name="search">
<input type="submit">

<!-- 입력창의 value는 사용자가 채워넣는 '빈칸'이고, 버튼의 value는 건우님이 붙여놓은 '간판'이다! -->
<!-- value case 3개
 사용자가 입력하는 입력 양식 : name은 이름표, value는 진짜 전송하는 값!(사용자 입력에 따라 달라짐)
 보이지 않는 입력 양식
 버튼 형식 : value는 내가 지정해둔 값이 전달되는 것 -->

    
</body>
</html>
