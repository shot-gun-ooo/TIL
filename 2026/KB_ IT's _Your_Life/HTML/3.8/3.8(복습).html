<!-- name은 사용자가 입력한 값을 서버에 보낼 때 '이 값은 어떤 항목의 값이다'라고 알려주는 변수 이름이다 -->
 
 <!-- 
value의 명확한 정체
입력창 (text / password): 사용자가 칸에 직접 타이핑한 '글자' 그 자체입니다.

선택창 (radio / checkbox): 화면에는 '남자/여자'라고 써있어도, 클릭 시 서버에 전달될 '미리 정해둔 값' (예: M, F)입니다.

버튼 (submit / button): 버튼 표면에 적혀 있는 '이름표' (예: 전송, 로그인)입니다.

서버 개발자에게 데이터를 보낼 때, 서버는 항상 name=value (예: age=25) 형태로 읽게 됩니다.-->

<!-- 
label은 사용자가 화면에서 보고 "아, 여기가 아이디 적는 칸이구나!"라고 알게 해주는 사람용 이름표입니다.

label을 사용하면 글자(예: "성별")만 눌러도 옆에 있는 작은 체크박스나 라디오 버튼이 자동으로 선택됩니다.

각 장애인이 사용하는 스크린 리더(화면 읽어주는 프로그램)가 이 입력창이 무엇을 적는 칸인지 정확히 읽어줄 수 있게 합니다.


 -->

 <!-- 가급적 input 할 때 name, value 같이 적자

  버튼(button, reset)처럼 데이터 자체를 담아 보낼 필요가 없는 요소에는 생략하기도 합니다. -->
