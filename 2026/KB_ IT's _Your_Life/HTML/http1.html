<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>로그인</h1>
    <form action="" method="get">
      검색어 : <input type="text" name="search" />
      <button>검색어 처리</button>
    </form>
    <form action="" method="post">
      <!-- form 안에 아무것도 지정하지 않으면 get방식 -->
      <!-- 브라우저가 http를 만들 때 body에 안넣고, 주소와 함께 head에 넣어서 노출됨 -->
      <!-- id, pw 는 주소에 노출되면 안된다.->  head로 전닫뢰면 안된다. -->
      <!-- http로 만들어서 노출되지 않도록 body에 넣어서 서버로 전달되어야함. -->
       <!-- http 응답 -->
        <!-- 응답줄(상태줄) : http버전(1.1), 상태값(200, 404, 500 등), 상태값에 대한 텍스트 
         header : 응답 데이터 정보(크기, 타입), 서버 정보
         엔터(빈 줄) 
         body : 응답 데이터(html, cs,, js, img 등)-->

      아이디 : <input type="text" name="userID" /><br />
      비밀번호 : <input type="text" name="password" />
      <button>로그인</button>
    </form>
  </body>
</html>
