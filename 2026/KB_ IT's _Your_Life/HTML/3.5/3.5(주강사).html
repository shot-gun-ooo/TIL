<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>오후도 파이팅해봅시다!</h1>
    <p>
      그냥 문장은 이렇게 되는건가요 그럼 여기서 띄어쓰기를 하려고 해도 연속으로
      된다는거죠? <br />여기서 바로 쓰면 되려나요
    </p>
    <hr />
    <p>여기 또 쓰면 새로운 본문이 생기는 &nbsp;&nbsp;건가요</p>
    <p>그냥 이러면 안되나</p>

    <a href="https://finance.naver.com/">오늘 증시는 어떨까요</a>

    <ul>
      <li><a href="#">네이버다</a></li>
      <li><a href="https://finance.naver.com/">오늘증시</a></li>
    </ul>
    <a href="#alpha">알파로 이동</a>
    <h2 id="alpha">알파에 잘 도착했습니다</h2>
    <!-- 페이지 내에서 특정 부분으로 이동하고자 할 때 유용 ex) 페이지가 길 때
     id는 무조건 하나 -->
    <a href="#">위로 올라가보자잇!</a>
    <!-- 그냥 #은 페이지의 최상단으로 올라가는 버튼으로 
     url을 적기 전에 기본적인 틀을 잡을 때 좀 많이 사용,
     그게 웹 표준이라 빈칸으로 두지 말자는 뜻 -->

    <table border="10">
      <tr>
        <th>이름</th>
        <th>전공</th>
      </tr>
      <tr>
        <td>박건우</td>
        <td>실내건축</td>
      </tr>
    </table>
    <!-- 바깥에서 안으로 만든다고 생각하면 편하다.
      1. table 만들기 border 설정
      2. 행 하나씩 추가(근데 hr만 적어봤자 아무것도 안나옴)
      3. 그 안에 들어갈 칸 (th,td)작성 -->

    <table border="1">
      <tr>
        <td>이름</td>
        <td>나이</td>
        <td>키</td>
      </tr>
      <tr>
        <td>박건우</td>
        <td>26</td>
        <td>179</td>
      </tr>
    </table>
    <!-- 일반적인 사이트 들어가서 최대한 표를 똑같이 따라하려고 하는 게 좋다 -->

    <table border="1">
      <tr>
        <th colspan="2">지역별 홍차</th>
      </tr>
      <tr>
        <th rowspan="3">중국</th>
        <th>정산소종</th>
      </tr>
      <tr>
        <td>기문</td>
      </tr>
      <tr>
        <td>운남</td>
      </tr>
      <tr>
        <th rowspan="4">인도 및 스리랑카</th>
        <td>아삼</td>
      </tr>
      <tr>
        <td>실론</td>
      </tr>
      <tr>
        <td>다질링</td>
      </tr>
      <tr>
        <td>닐기리</td>
      </tr>
    </table>

    <!-- <table border="1">
      <tr>
        <th colspan="2">지역별 홍차</th>
      </tr>
    <tr><th rowspan="3">중국</th></tr>
    </table> -->
    <!-- 자습 때 다시 해보자 -->

    <img
      src="https://i.pinimg.com/1200x/d3/a2/e1/d3a2e1bcb462019e43e992295eed6a99.jpg"
      alt="잠시만 기다려주세요"
      ,
      width="200"
    />
    <!-- url이 아니라 이미지 주소 자체를 복사해야한다. 확장자 jpg처럼 -->
    <img src="./Penguins.jpg" alt="나오나요" />
    <img src="./Penguins.jpg" alt="잘 나오나요" />
    <!-- 만약 사진이 같은 파일에 있는 것이 아니라면 /를 이용해서 파일 경로를 직접 설정해줘야한다. -->
    <!-- 상대경로
      ./ -> 현재위치 -> 지금 폴더 안에서 찾아봐
       ../ -> 상위폴더(밖으로) -> 지금 폴더 밖으로 나가서 찾아봐
       폴더명/ -> 하위폴더 
       -->

    <form action="#">
      <input type="text" name="search" />
      <input type="submit" />
    </form>

    <form action="#" method="get">
      <input type="text" name="search" />
      <input type="submit" />
    </form>

    <form action="#">
      <input type="checkbox" />
      <input type="file" />
      <select name="전공" id="전공">
        <option value="interior">실내건축</option>
        <option value="fianace">파이낸스</option>
      </select>

      <form action="#">
        <table>
          <tr>
            <td><label for="username"></label>이름</td>
            <td><input type="text" id="username" name="username" /></td>
          </tr>
          <tr>
            <td>성별</td>
            <td>
              <input type="radio" id="man" name="gender" value="m" />
              <label for="man">남자</label>
            </td>
            <td>
              <input type="radio" id="woman" name="gender" value="w" />
              <label for="woman">여자</label>
            </td>
          </tr>
        </table>
        <input type="submit" value="가입" />
      </form>
    </form>

    <select name="" id="">
      <option value="">김밥</option>
      <option value="">떡볶이</option>
    </select>

    <select name="" id="">
      <optgroup label="HTML5">
        <option value="">annimation</option>
        <option value="">lunch</option>
      </optgroup>
    </select>
  </body>
</html>
