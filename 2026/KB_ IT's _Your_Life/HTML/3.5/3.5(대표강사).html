<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 화면을 줄였을 때 그 화면에 맞게 어느 정도 비율 유지해주는 것 -->
    <title>3월5일입니다</title>
    <!-- 이건 타이틀입니다~ -->
    <!-- commmand + B : 왼쪽 메뉴 자동숨기기/보이기 왔다갔다  -->
    <!-- command + shift + f : 자동정렬 -->

    <style>
      h1 {

        background: pink;
      }
      h6 {
        color: peru;

    <!-- css : 내부스타일은 head에 -->
    <link rel="stylesheet" href="style.css" />

    <!-- 괄호없이 link 먼저 기재하면 문법이 쫙 나온다. 다른 것들도 마찬가지 -->
  </head>

      // 자바스크립트 알림창은 브라우저에 따라 달라라지는 것
      alert('환영합니다');
