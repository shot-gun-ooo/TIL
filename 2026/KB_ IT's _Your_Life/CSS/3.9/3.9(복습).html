<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>월요일입니다~</title>
    <style>
        #head{
            width: 800px;
            margin: 0 auto;
        }
    </style>
  </head>
  <body>
    <div id="head"><h1>head</h1></div>
    <div>
      <div id="aside">asied</div>
      <div id="content">content</div>
    </div>

    <!-- float: left;는 언제 쓰나요? 
     주로 block 요소들을 강제로 옆으로 나란히 세우고 싶을 때 씁니다. -->
    <!-- id는 유일한 요소를 식별하거나 기능을 연결할 때 쓰고, 
      class는 스타일을 반복해서 입히거나 여러 효과를 조합할 때 사용한다 -->
    <!-- 속성 선택자(Attribute Selector)**는 태그 이름이나 class, id가 없더라도 
       태그가 가진 특정 속성(Attribute)이나 그 값을 콕 집어서 스타일을 입힐 수 있는 아주 유용한 도구 -->
  </body>
</html>
