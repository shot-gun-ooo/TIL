<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const students = [
        { name: '박건우', scores: { kor: 90, eng: 85 } },
        { name: '김철수', scores: { kor: 70, eng: 60 } },
        { name: '이영희', scores: { kor: 95, eng: 90 } },
      ];

      // 문제: 평균 80점 이상인 학생의 '이름'만 배열로 추출하세요.
      // Hint: .filter()와 .map()을 체이닝으로 연결해보세요!
      // const result = students.filter(student => { (student.scores.kor + student.scores.eng) /2 >= 80)}
      // )

      const result = students.filter((score) => {
        return (score.scores.kor + score.scores.eng) / 2 >= 80;
      }).map((score)=>score.name);
      console.log(result);
    </script>
  </body>
</html>
