<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05-13 실습</title>
    <link rel="stylesheet" href="https://unpkg.com/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/font-awesome@4.7.0/css/font-awesome.min.css" />
</head>
<body>
    <div id="app">
        <div class="container" style="position:absolute; top:8px; left:8px; bottom:0; right:0;">
            
            <div class="list-group"
                @contextmenu.prevent  /* 4-1. 우클릭 시 메뉴 뜨는 걸 막음 (이동 기능에 집중) */
                
                /* 4-2. 왼쪽 클릭: 현재 번호(currentIndex)가 0보다 클 때만 1씩 감소 (위로 이동) */
                @click.left="if(currentIndex > 0) currentIndex--;"
                
                /* 4-3. 오른쪽 클릭: 현재 번호가 마지막 번호보다 작을 때만 1씩 증가 (아래로 이동) */
                @click.right="if(currentIndex < itemlist.length - 1) currentIndex++;"
                
                /* 4-4. CTRL+왼쪽 클릭: 무조건 0번(맨 위)으로 인덱스 초기화 */
                @click.ctrl.left="currentIndex=0"ㅇ
                
                /* 4-5. CTRL+오른쪽 클릭: 무조건 마지막 번호(맨 아래)로 인덱스 설정 */
                @click.ctrl.right="currentIndex=itemlist.length-1"
            >

                <a href="#" class="list-group-item" 
                   v-for="(item, index) in itemlist" :key="item"
                   /* [5-1] 조건부 클래스: 내 번호(index)가 선택된 번호(currentIndex)와 같으면 'active' 클래스(파란색) 추가 */
                   :class="{active : index === currentIndex}">
                    
                    {{item}}

                    <span v-if="index === currentIndex" class="pull-right badge badge-secondary">
                        <i class="fa fa-arrow-left" aria-hidden="true"></i>
                    </span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script type="text/JavaScript">
        var vm = Vue.createApp({
            name: "App",
            /* [순서 3-1] 데이터 창고(data): 앱이 사용할 변수들을 정의합니다. */
            data() {
                return {
                    // 리스트에 뿌릴 문자열 배열
                    itemlist : ["Item1", "Item2", "Item3", "Item4", "Item5", "Item6", "Item7", "Item8", "Item9"],
                    // 현재 어느 줄을 보고 있는지 저장하는 핵심 변수 (기본값: 첫 번째 줄)
                    currentIndex : 0
                };
            }
        }).mount("#app") /* [순서 3-2] 연결: #app 아이디를 가진 HTML과 Vue를 합체시킵니다. */
    </script>
</body>
</html>
