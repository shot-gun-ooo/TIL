<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // 개발자가 선언한 함수 (사용자 정의 함수)
      function rec() {
        // 1. 입력(데이터 가지고 오기)
        // 가로값 가지고 오기
        // 세로값 가지고 오기
        // 2. 처리
        // 면적 계산하기
        // 3. 출력
        let n1 = document.getElementById('n1').value;
        // input태그에서 value속성값만 가지고 와라
        let n2 = document.getElementById('n2').value;
        // 브라우저의 input에서 입력한 value값은 모두 문자로 인식해버린다.
        let n11 = parseInt(n1) //parseFloat():실수
        let n22 = parseInt(n2)
        let result = n11 * n22;

        alert('목요일이다!! 파이팅!'+result);
      }
    </script>
  </head>
  <body>
    <span style="color: aqua">가로값</span> :
    <input type="text" id="n1" /><br />
    <!-- span은 그 자체로는 아무런 힘이 없지만, 
     문장 안의 특정 글자만 콕 집어서 색을 바꾸거나 스타일을 줄 때 쓰는 아주 유용한 태그 -->
    세로값 : <input type="text" id="n2" /><br />
    <!-- <button
      style="background: yellow; color: blue"
      onclick="alert('버튼 클릭')"
    > -->
    <!-- alert은 이미 브라우저에 내장된 함수 -->
    <!-- ;(세미콜론)은 '스타일'끼리 구분할 때 쓰는 벽이고, **onclick은 스타일이 아니라 새로운 '속성' -->
    <button style="background: yellow; color: blue" onclick="rec()">
      사각형의 면적 구하기
    </button>
  </body>
</html>
