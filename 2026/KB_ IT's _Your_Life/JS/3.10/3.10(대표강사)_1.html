<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // 자바스크립트 주석
      // 램에 저장공간인 변수를 만들어봅시다.
      var age = 100;
      age = 200;
      // 자바는 ;생략가능하지만 실무에서는 사용하도록 권장한다.
      age = 'young';
      //   JS는 변수에 데이터 타입(유형)이 고정되지 않고, 아무 타입이나 넣어도 된다.
      // 할당할 수 있는 데이터 타입이 동적이다.
      //   var는 생략 가능하다.
      tel = '0101234';
      post = '3203100';
      //  숫자를 따옴표('')없이 사용하는 경우에는 자릿수가 의미가 있거나 계산할 목적이 있어야 한다.
      // 따옴표없이 숫자 적는 거는 진짜 사칙연산, 숫자로 역할을 할 경우
      weight = 99.9;
      //   소숫점들어간 숫자를 실수(float)
      height = 185.2;
      age = 100;
      //   소숫점 안들어간 숫자를 정수(integer)
      name = '빌게이츠';
      food = true;
      //   true false(틀려요, 거짓말이에요) 맞다/ 틀리다를 써야할 때 사용한다. -> boolean(bool, 부울, 불)
      // 프로그래밍할 때 제일 많이 쓰는 데이터의 유형 4가지
      // 정수, 실수, 문자, bool(논리형)
      // 자바스크립트는 브라우저에서 실행된다.
      // 브라우저의 각 부분을 나타내는 부품(객체)이 따로 있다.
      // 브라우저 body -> document
      // 브라우저 f12 console -> console
      alert('곧 점심 시간이네요');
      //  브라우저 위에 조그마한 창을 띄우는 기능을 가진 명령어(function, 함수)
      // 
      window.alert(age);
      // 브라우저 전체 부품 -> window(생략가능)
      alert(name);
      alert(name + ' ' + food + '야');
      result = 'no';
      //   +는 숫자가 나오면 더하기, 문자가 나오면 연결
      //   에러가 발생하면 일단 아무것도 실행을 안시킴 -> 결국 window에서 실행해주는 거라서 브라우자 f12로 오류 찾아야 한다.
      //   f12(개발자 도구)의 콘솔에서 개발자들은 값을 확인 많이 함
      // JS코드에서 console이라고 치면 f12의 console로 인식함
      console.log('콘솔은 개발 할 때 정말 많이 사용합니다');
      // window만 생략 가능, console은 꼭 써야함
      // 콘솔을 보려면 반드시 f12를 눌러줘야 한다.
      // 실제 개발할 때 많이 사용한다.
      console.log();
      // console은 진짜 많이 쓰는 거라서 log만 눌러서 자동완성 하면 된다.
      // document라고 JS코드에 쓰면 body라 인식해서 body에 작성된 것처럼 된다
      document.write('나는 body안에 써줘요')
      // 하지만 document.write을 가장 안쓴다. body에 쓰는 게 편하니까
      // 만약 그럼에도 사용하고 싶다면 id쓰면 되기는 한다.
      
      
    </script>
  </head>
  <body>
    <button style="background: yellow">나를 눌러봐</button>
    
  </body>
</html>
