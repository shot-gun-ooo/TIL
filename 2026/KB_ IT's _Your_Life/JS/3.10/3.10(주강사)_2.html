<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      /*
        ================================
        변수 개념
        ================================

        변수(variable)

        데이터를 저장하는 공간(메모리 공간)

        변수 선언
        → 저장 공간을 만든다

        변수 할당
        → 변수에 값을 넣는다

        예

        let age = 20

        age  → 변수 이름
        20   → 저장된 값
        =    → 할당(대입) 연산자




        */
      //  https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Statements/var
      //  https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Statements/const
      // https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Statements/let
      // 변수 (저장공간 ) 를 선언하고 , 값을 할당(대입 = )한다
      // var는 변수를 블록을 고려하지 않고 현재 함수 (또는 전역 스코프) 어디에서나 접근할 수 있는 변수를 선언
      // let 명령문은 블록 스코프의 범위를 가지는 지역 변수를 선언, 자신을 선언한 블록과 모든 하위 블록을 스스로의 스코프로가짐
      // const는 변하지 않는 값을 저장하는 변수 == 상수

      /*
        ================================
        var / let / const 비교
        ================================

                    재선언   재할당   스코프
        ---------------------------------------
        var          가능     가능     함수 스코프
        let          불가능   가능     블록 스코프
        const        불가능   불가능   블록 스코프
        */
      /*
        ================================
        스코프(scope)
        ================================

        스코프란

        변수에 접근할 수 있는 범위를 의미한다.

        1. 전역 스코프 (Global Scope)
        → 어디서든 접근 가능

        2. 함수 스코프 (Function Scope)
        → 함수 안에서만 접근 가능

        3. 블록 스코프 (Block Scope)
        → { } 내부에서만 접근 가능

        let / const 는 블록 스코프를 가진다.
        */

      var name = '제니';
      var age = 10;
      var name = '리사';
      //   var은 재선언 가능 -> 대신 처음 선언한 변수가 바뀜
      age = 30;

      let phone = '010102020203030';
      //   let은 재선언하려고 하면 빨간줄이라고 뜨면서 안된다는 것을 알려준다 -> 여기저기서 중복되지 않도록 방지
      phone = '0102003303030'; //  재할당
      //   재선언이랑 재할당은 다르다..!!
      // var은 다 가능하다.
      // ******let은 변수 상자를 다시 만드는 것(재선언)은 막지만, 상자 안의 물건을 바꾸는 것(재할당)은 허용한다!
      // 만약 값 변경까지 막고 싶다면 const를 사용해라!
      //   선언할 때만 var, let, const 같은 것을 같이 기재하는 것. 선언을 하면 램에 공간이 만들어지는 것이라 이후엔 하면 안된다.

      const PI = 3.14;
      // const PI = '' 재선언이 불가능
      //   PI = 3.15;
      // const인데 내 마음대로 3.15라고 하면 오류 발생 -> Uncaught TypeError: Assignment to constant variable.
      console.log(PI);

      let x = 100;
      let y = 200;
      console.log('x = ', x);
      console.log('y = ', y);

      /*       
         https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators#arithmetic_operators
        사칙연산
        + : 더하기
        - : 빼기
        * : 곱하기
        / : 나누기
        % : 나머지
        */
      console.log('x + y =', x + y);
      console.log('x - y =', x - y);
      console.log('x * y =', x * y);
      console.log('x / y =', x / y);
      console.log('y % x =', y % x);

      let result = x + y;
      console.log(result - 100);

      /* 1. Infinity
           → 무한대를 의미하는 값이다.
           → 예: 0으로 나누기
        2. NaN (Not a Number)
           → 숫자가 아닌 값을 숫자로 계산하려고 할 때 발생한다.
        
           참고 (MDN)
        Infinity
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/Infinity
        NaN
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/NaN
        */

      let inf = 10 / 0;
      let nan1 = 'hello' * 3;
      let nan2 = Number('abc');

      console.log(inf);
      console.log(nan1);
      console.log(nan2);

      /*
        =================================
        2. String (문자열)
        =================================
        문자열은 문자를 표현하는 자료형이다.
        문자열은 큰따옴표("") 또는 작은따옴표('')로 감싼다.
        참고 (MDN)
        String
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/String
        */

      let username = '홀길동';
      let city = '서울';

      console.log('usernmae', username);
      console.log('city', city);

      console.log(100 + '이름' + city);

      /*
        =================================
        3. Escape 문자 (이스케이프 문자)
        =================================
        문자열 안에서 특수한 의미를 가지는 문자
        \n  → 줄바꿈
        \t  → 탭
        \"  → 큰따옴표 출력
        \'  → 작은따옴표 출력
        \\  → 역슬래시 출력
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Guide/Grammar_and_types#escaping_characters
        */
      let text1 = '안녕하세요\n자바스크립트';
      let text2 = '이름\t나이';
      let text3 = '"큰따옴표" 출력';
      let text4 = "'작은따옴표' 출력";
      let text5 = '\\ 역슬래시 출력 \\';
      console.log(text1);
      console.log(text2);
      console.log(text3);
      console.log(text4);
      console.log(text5);

      /*
        =================================
        5. Boolean (논리형)
        =================================
        Boolean은 참(true) 또는 거짓(false)을 저장하는 자료형
        주로 비교 결과를 저장할 때 사용한다.
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/Boolean
        */

      let isstudent = true;
      let isadult = false;

      console.log(isstudent);
      console.log(isadult);

        /*
        =================================
        6. 비교 연산자
        =================================
        비교 연산의 결과는 Boolean(true / false) 이다.
        ==   → 값만 비교
        !=   → 값이 다르면 true
        ===  → 값과 자료형까지 비교
        !==  → 값 또는 자료형이 다르면 true
        >    → 크다
        <    → 작다
        >=   → 크거나 같다
        <=   → 작거나 같다

       https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators#comparison_operators
        */
        let result2 = (x == y);
        console.log("x == y :", result2); // false
        console.log("!result2 :", !result2); // true
        let result3 = (x === "100");
        let result4 = (x === 100);
        console.log("x === '100' :", result3); // false (자료형도 다름)
        console.log("x === 100 :", result4); // true
        console.log("x > y :", x > y); // false
        console.log("x < y :", x < y); // true
        console.log("x >= 100 :", x >= 100); // true
        console.log("y <= 300 :", y <= 300); // true

           /*
        =================================
       7. 논리 연산자
        =================================
        논리 연산자는 true / false 값을 조합할 때 사용한다.
        &&  → 그리고(AND)
              둘 다 true일 때 true
        ||  → 또는(OR)
              하나라도 true이면 true
        !   → 부정(NOT)
              true를 false로, false를 true로 바꾼다.
        Logical operators
        https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators#binary_logical_operators
        */

        let a = true;
        let b = false;
        console.log("a && b =", a && b); // false
        console.log("a || b =", a || b); // true
        console.log("!a =", !a);         // false
        console.log("!b =", !b);         // true

        /*
        =================================
        8. 부동소수점 실수 계산 주의
        =================================
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/Number
        부동소수점 오차
        실수를 2진수 방식으로 계산하기 때문에
        일부 소수 계산에서 오차가 발생할 수 있다.

        */

        let n1 = 0.1;
        let n2 = 0.2;
        let n3 = n1 + n2;

        console.log("0.1 + 0.2 =", n3); // 0.30000000000000004

         /*
        toFixed()
        → 원하는 소수점 자리까지 문자열로 바꾼다.

        참고 (MDN)
        Number.prototype.toFixed()
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/Number/toFixed
        */

        console.log("(0.1 + 0.2).toFixed(1) =", n3.toFixed(1)); // "0.3"

        /*
        Number()로 다시 숫자로 바꿀 수도 있음
        */

        let n4 = Number(n3.toFixed(1));
        console.log("Number(toFixed 결과) =", n4);
        let n5 = parseFloat(n3.toFixed(1));
        console.log("parseFloat =", n5) //실수로 변환

        /*
        =================================
        9. typeof 연산자
        =================================

       typeof는 값의 자료형을 확인할 때 사용하는 연산자이다.
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Operators/typeof

        */

        console.log("typeof x =", typeof x);           // number
        console.log("typeof name =", typeof name);     // string
        console.log("typeof isStudent =", typeof isStudent); // boolean
        console.log("typeof n4===n5", n4 === n5); 

        /*
        =================================
        10. 형 변환 (Type Conversion)
        =================================

        JavaScript는 필요에 따라 자료형이 변환될 수 있다.

        형 변환이란?
        → 자료형을 다른 자료형으로 바꾸는 것이다.

        JavaScript에서는 문자열을 숫자로,
        숫자를 문자열로 바꾸는 일이 자주 있다.

        Number()
        → 숫자로 변환

        parseInt()
        → 정수로 변환

        parseFloat()
        → 실수로 변환

        String()
        → 문자열로 변환

        Boolean()
        → true / false로 변환

        참고 (MDN)
        Number
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/Number

        parseInt
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/parseInt

        parseFloat
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/parseFloat
   
        명시적 형 변환
        → 개발자가 직접 변환
        */

        let num1 = Number("123");
        let num2 = parseInt("456");
        let num3 = parseFloat("3.14");
        let str1 = String(100);
        let bool1 = Boolean(1);
        let bool2 = Boolean(0);

        console.log("Number('123') =", num1);
        console.log("parseInt('456') =", num2);
        console.log("parseFloat('3.14') =", num3);
        console.log("String(100) =", str1);
        console.log("Boolean(1) =", bool1); // true
        console.log("Boolean(0) =", bool2); // false

      /*
      묵시적 형 변환

      연산 과정에서 자동으로 자료형을 변환하는 것을 말한다.

      예를 들어
      문자열과 숫자를 + 연산하면
      숫자가 문자열로 자동 변환된다.

     
      https://developer.mozilla.org/ko/docs/Glossary/Type_coercion
      */

      let test1 = 7 + "7";
      let test2 = "7" + 7;
      let test3 = 7 + 7 + "7";
      let test4 = "7" + 7 + 7;

      console.log("7 + '7' =", test1);     // "77"
      console.log("'7' + 7 =", test2);     // "77"
      console.log("7 + 7 + '7' =", test3); // "147" //왼쪽부터 계산하기 때문
      console.log("'7' + 7 + 7 =", test4); // "777"
        
      /*
        =================================
        10-2. NaN 검사
        =================================

        NaN은 "숫자가 아님"을 뜻하는 특별한 값이다.

        NaN을 검사하는 방법은 2가지가 많이 쓰인다.

        1. isNaN()
           → 값을 숫자로 변환한 뒤 검사한다.

        2. Number.isNaN()
           → 값이 실제 NaN인지 확인 ->  값이 NaN 이냐? 

        참고 (MDN)
        isNaN
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/isNaN

        Number.isNaN
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/Number/isNaN
        */
       let value1 = Number("123");
       let value2 = Number("abc"); // 숫자로 바꿀수없는 문자를 변환 하니까 nan

        console.log("Number.isNaN(value1) =", Number.isNaN(value1)); // false
        console.log("Number.isNaN(value2) =", Number.isNaN(value2)); // true


        function checkInput() {
            let money = "abc";
            let count = 10;
            console.log("Number.isNaN(money) =", Number.isNaN(money)); // false NaN 이아니니까
            console.log("Number.isNaN(count) =", Number.isNaN(count)); // false NaN 이아니니까
            console.log("isNaN(money) =", isNaN(money)); // true // 숫자로 바꿀수없는 문자를 변환 하니까 nan
            console.log("isNaN(count) =", isNaN(count)); // false
            if (isNaN(money) || isNaN(count)) {
                console.log("숫자를 입력하세요"); // money가 숫자가 아니므로 실행
                return; // 함수 실행 중단
            }

            console.log("정상 입력");
        }

        checkInput();

          /*
        =================================
        11. undefined 와 null
        =================================
        undefined
        → 값이 아직 할당되지 않음
        null
        → 일부러 비어 있는 값을 넣음


        참고 (MDN)
        undefined
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/undefined
        null
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/null
        */
        let data1;
        let data2 = null;
        console.log("data1 =", data1);
        console.log("data2 =", data2);
        console.log("typeof data1 =", typeof data1); // undefined
        console.log("typeof data2 =", typeof data2); // object  // null의 typeof 결과가 object인 것은 JavaScript의 오래된 특징이다.
      
      
    </script>
  </head>
  <body></body>
</html>
