        기본 자료형 개념 정리
        =================================

        기본 자료형

        1. Number
           → 숫자형
           → 정수, 실수 모두 포함
           예: 10, 3.14

        2. String
           → 문자열
           → 문자 여러 개를 따옴표로 감싼 값
           예: "hello", '안녕하세요'

        3. Boolean
           → 논리형
           → true 또는 false 값만 가짐

        4. Undefined
           → 값이 아직 정해지지 않은 상태

        5. Null
           → 비어 있는 값, 의도적으로 값이 없음을 의미

       참고 (MDN)
        JavaScript data types and data structures
        https://developer.mozilla.org/ko/docs/Web/JavaScript/Data_structures

        1. Number (숫자형)
        =================================

        JavaScript의 숫자형은
        정수와 실수를 따로 나누지 않고
        모두 Number로 처리한다.

        예
        100     → 정수
